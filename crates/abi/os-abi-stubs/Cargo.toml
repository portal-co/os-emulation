[package]
name = "os-abi-stubs"
version = "0.1.0"
edition = "2021"
description = "Checked-in ABI redirect stub metadata and native emitters (generated by os-abi-codegen)."
publish = false
license-file = "../../../../speet/COPYING.md"

[features]
default = []
native = [
    "dep:portal-solutions-asm-x86-64",
    "dep:portal-solutions-asm-aarch64",
    "dep:portal-solutions-blitz-common",
]

[dependencies]
binary-io = { path = "../../../../binary-io" }
os-host-api = { path = "../../runtime/os-host-api" }
os-abi-spec = { path = "../os-abi-spec" }
portal-solutions-asm-x86-64 = { path = "../../../../asm-arch/crates/asm-x86-64", optional = true, features = ["iced"] }
portal-solutions-asm-aarch64 = { path = "../../../../asm-arch/crates/asm-aarch64", optional = true, features = ["bin-backend"] }
portal-solutions-blitz-common = { path = "../../../../wasm-blitz/crates/blitz-common", optional = true, features = ["asm"] }
